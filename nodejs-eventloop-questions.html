    <script>
      window.__PDF_READY = false;
      function escapeHtml(value) {
        return String(value)
          .replace(/&/g, "&amp;")
          .replace(/</g, "&lt;")
          .replace(/>/g, "&gt;")
          .replace(/\"/g, "&quot;")
          .replace(/'/g, "&#039;");
      }

      function escapeRegExp(value) {
        return value.replace(/[.*+?^${}()|[\]\\]/g, "\\$&");
      }

      function highlightKeywords(text) {
        const keywords = [
          "Event Loop",
          "Libuv",
          "V8",
          "Timers",
          "Poll",
          "Check",
          "Microtasks",
          "Macrotasks",
          "process.nextTick",
          "setImmediate",
          "Promises",
          "Thread Pool",
          "worker_threads",
          "I/O",
          "GC",
        ];

        let output = escapeHtml(text);
        keywords.forEach((word) => {
          const hasNonWord = /[^a-z0-9_]/i.test(word);
          const boundary = hasNonWord ? "" : "\\b";
          const pattern = new RegExp(`${boundary}${escapeRegExp(word)}${boundary}`, "gi");
          output = output.replace(pattern, (match) => `<span class="highlight">${match}</span>`);
        });
        return output;
      }

      function formatAnswer(text) {
        const safe = text || "";
        const numberedMatch = safe.match(/\d+\.\s+/);
        if (numberedMatch) {
          const parts = safe.split(/\d+\.\s+/).filter(Boolean);
          const items = parts
            .map((part) => `<li>${highlightKeywords(part.trim())}</li>`)
            .join("");
          return `<ol>${items}</ol>`;
        }

        const sentenceMatches = safe.match(/[^.!?]+[.!?]+|[^.!?]+$/g) || [];
        const sentences = sentenceMatches.map((s) => s.trim()).filter(Boolean);
        if (sentences.length >= 3) {
          const first = `<p>${highlightKeywords(sentences[0].trim())}</p>`;
          const rest = sentences.slice(1).map((s) => `<li>${highlightKeywords(s.trim())}</li>`).join("");
          return `${first}<ul>${rest}</ul>`;
        }

        return `<p>${highlightKeywords(safe.trim())}</p>`;
      }

      function isCommentOnly(code) {
        const trimmed = (code || "").trim();
        if (!trimmed) return true;
        const withoutLineComments = trimmed.replace(/^\s*\/\/.*$/gm, "");
        const withoutBlockComments = withoutLineComments.replace(/\/\*[\s\S]*?\*\//g, "");
        return withoutBlockComments.trim().length === 0;
      }

      function formatCommentText(code) {
        const lines = (code || "")
          .split(/\r?\n/)
          .map((line) => line.replace(/^\s*\/\/\s?/, "").trim())
          .filter(Boolean);
        if (lines.length === 0) return "<p>No code example provided.</p>";
        const paragraphs = lines.map((line) => `<p>${escapeHtml(line)}</p>`).join("");
        return paragraphs;
      }

      function highlightCode(code) {
        let output = escapeHtml(code || "");
        output = output.replace(/(\/\*[\s\S]*?\*\/|\/\/[^\n]*)/g, "<span class=\"tok-comment\">$1</span>");
        output = output.replace(/(['\"`])(?:\\.|(?!\1).)*\1/g, "<span class=\"tok-string\">$&</span>");
        output = output.replace(/\b(const|let|var|function|return|if|else|for|while|class|new|try|catch|await|async|import|from|require|export|default|throw)\b/g, "<span class=\"tok-keyword\">$1</span>");
        output = output.replace(/\b(\d+)\b/g, "<span class=\"tok-number\">$1</span>");
        output = output.replace(/\b([A-Za-z_][A-Za-z0-9_]*)\s*(?=\()/g, "<span class=\"tok-fn\">$1</span>");
        output = output.replace(/\b(process|Promise|setTimeout|setImmediate|setInterval|console|fs|net|require)\b/g, "<span class=\"tok-const\">$1</span>");
        return output;
      }

      function createQuestionPage(item, total, topic) {
        const page = document.createElement("section");
        page.className = "page question-page";

        const topbar = document.createElement("div");
        topbar.className = "question-topbar";

        const topicTag = document.createElement("div");
        topicTag.className = "topic-tag";
        topicTag.textContent = topic;

        const badge = document.createElement("div");
        badge.className = "question-badge";
        badge.textContent = `Q${item.id.toString().padStart(2, "0")}`;

        topbar.appendChild(topicTag);
        topbar.appendChild(badge);

        const header = document.createElement("div");
        header.className = "question-header";

        const number = document.createElement("div");
        number.className = "question-number";
        number.textContent = `Question ${item.id} of ${total}`;

        header.appendChild(number);

        const questionBlock = document.createElement("div");
        questionBlock.className = "question-block";

        const title = document.createElement("div");
        title.className = "question-title";
        title.innerHTML = highlightKeywords(item.question || "");

        questionBlock.appendChild(title);

        const approachSection = document.createElement("div");
        approachSection.className = "approach-section";

        const approachLabel = document.createElement("div");
        approachLabel.className = "section-label";
        approachLabel.textContent = "Approach";

        const approachText = document.createElement("div");
        approachText.className = "approach-text";
        approachText.textContent = item.approach || "";

        approachSection.appendChild(approachLabel);
        approachSection.appendChild(approachText);

        const answerSection = document.createElement("div");
        answerSection.className = "answer-section";

        const answerLabel = document.createElement("div");
        answerLabel.className = "section-label";
        answerLabel.textContent = "Answer";

        const answerContent = document.createElement("div");
        answerContent.className = "answer-content";
        answerContent.innerHTML = formatAnswer(item.answer || "");

        answerSection.appendChild(answerLabel);
        answerSection.appendChild(answerContent);

        const codeLabel = document.createElement("div");
        codeLabel.className = "code-label";
        codeLabel.textContent = "Code Example";

        const codeExample = item.code_example || "";
        let codeBlock;
        if (isCommentOnly(codeExample)) {
          codeBlock = document.createElement("div");
          codeBlock.className = "code-text";
          codeBlock.innerHTML = formatCommentText(codeExample);
        } else {
          const pre = document.createElement("pre");
          const code = document.createElement("code");
          code.innerHTML = highlightCode(codeExample);
          pre.appendChild(code);
          codeBlock = pre;
        }

        page.appendChild(topbar);
        page.appendChild(header);
        page.appendChild(questionBlock);
        page.appendChild(approachSection);
        page.appendChild(answerSection);
        page.appendChild(document.createElement("div")).className = "divider-line";
        page.appendChild(codeLabel);
        page.appendChild(codeBlock);

        return page;
      }

      async function loadQuestions() {
        try {
          const response = await fetch("nodejs-eventloop-question.json", { cache: "no-store" });
          if (!response.ok) {
            throw new Error("Failed to load questions");
          }
          const data = await response.json();
          const questions = data.questions || [];

          document.getElementById("topic").innerHTML = data.topic || "Node.js Event Loop";
          document.getElementById("target").textContent = data.target || "Interview Preparation";
          document.getElementById("questionCount").textContent = questions.length;

          const pages = document.getElementById("pages");
          pages.innerHTML = "";
          questions.forEach((item) => {
            pages.appendChild(createQuestionPage(item, questions.length, data.topic || "Node.js Event Loop"));
          });

          const endPage = document.createElement("section");
          endPage.className = "page end-page";
          endPage.innerHTML = `
            <div class="end-card" style="width: 100%;">
              <div class="end-pill">Follow On LinkedIn</div>

      async function downloadPDF() {
        const btn = document.getElementById("downloadBtn");
        const originalText = btn.textContent;
        btn.textContent = "Generating PDF...";
        btn.disabled = true;

        try {
          const response = await fetch("/nodejs-eventloop.pdf");
          if (!response.ok) {
            throw new Error("PDF generation failed");
          }

          const blob = await response.blob();
          const url = window.URL.createObjectURL(blob);
          const link = document.createElement("a");
          link.href = url;
          link.download = "NodeJS_Event_Loop_Questions.pdf";
          document.body.appendChild(link);
          link.click();
          link.remove();
          window.URL.revokeObjectURL(url);

          btn.textContent = "Downloaded Successfully";
          btn.style.background = "linear-gradient(135deg, #22c55e, #16a34a)";
        } catch (error) {
          console.error("PDF Generation Error:", error);
          btn.textContent = "Error - Use Print Button";
          btn.style.background = "linear-gradient(135deg, #dc2626, #991b1b)";
        }

        setTimeout(() => {
          btn.textContent = originalText;
          btn.style.background = "linear-gradient(135deg, #0ea5e9, #0284c7)";
          btn.disabled = false;
        }, 2500);
      }

      window.addEventListener("load", loadQuestions);
